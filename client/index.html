    <!-- JSON-LD Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is BRE470?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "BRE470 (BR 470, published by BRE in 2004) is the UK industry standard guidance document for the design of working platforms for tracked plant, including piling rigs. It provides a calculation methodology based on Appendix A for determining the required thickness of granular platforms on cohesive or granular subgrades."
          }
        },
        {
          "@type": "Question",
          "name": "How much does a BRE470 piling mat design cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Each certified BRE470 piling mat design costs £299.99. This includes full interpretive calculations, a cross-section diagram, and a professional check certificate signed by David Miller, Temporary Works Designer. Traditional consultancy designs typically cost £500–£1,000, so you save 50-70%."
          }
        },
        {
          "@type": "Question",
          "name": "Who signs the design certificate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "All design certificates are signed by David Miller, Temporary Works Designer at Temporary Works Consulting Ltd. Each certificate includes a unique reference number, full calculation audit trail, and professional sign-off."
          }
        },
        {
          "@type": "Question",
          "name": "Which piling rigs are supported?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The tool includes 23 pre-loaded piling rigs from Liebherr (LB 16 to LB 44, LRB 155, LRB 255), Bauer (BG 15 H to BG 46), and Soilmec (SR-30 to SR-100) with EN 996 track dimensions auto-filled. You can also enter custom rig parameters manually."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to get a design certificate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The entire process takes approximately 2 minutes. Enter your site parameters, review the calculated platform thickness and cross-section diagram, then pay £299.99 to receive your professional design certificate instantly."
          }
        },
        {
          "@type": "Question",
          "name": "Is the design compliant with BR 470?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All calculations follow the BRE470 Appendix A methodology for both cohesive and granular subgrades, including partial factors, bearing capacity checks, and optional geosynthetic reinforcement. The design output is fully aligned with BR 470 (BRE 2004) guidance."
          }
        }
      ]
    }
